spring.application.name=autocredit-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.exchange.fallback.usd-pen=${EXCHANGE_FALLBACK_USD_PEN:3.80}

jwt.secret=${JWT_SECRET:dev-only-autocredit-secret-minimum-32-chars-change}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
