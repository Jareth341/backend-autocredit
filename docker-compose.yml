services:
  postgres:
    image: postgres:16
    container_name: autocredit-postgres
    environment:
      POSTGRES_DB: autocredit
      POSTGRES_USER: autocredit_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - autocredit_pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: autocredit-backend
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/autocredit
      DB_USERNAME: autocredit_user
      DB_PASSWORD: change_me
      JWT_SECRET: change_me_minimum_32_characters_for_hs256
      JWT_EXPIRATION_MS: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      EXCHANGE_FALLBACK_USD_PEN: 3.80
      JPA_DDL_AUTO: update
    ports:
      - "8080:8080"

volumes:
  autocredit_pgdata:
